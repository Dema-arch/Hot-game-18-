<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Брудні Історії 📖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button">← Назад</a>
        
        <div id="menuScreen" class="screen active">
            <h1>📖 Брудні Історії</h1>
            <p class="subtitle">Еротичні історії для читання вголос. Партнер виконує те, що читаєш!</p>
            
            <div class="menu-buttons">
                <button class="btn primary large" onclick="startGame()">Почати гру</button>
                <button class="btn secondary" onclick="showInstructions()">Як грати?</button>
            </div>
        </div>

        <div id="instructionsScreen" class="screen">
            <h1>📖 Як грати?</h1>
            <div class="instructions-content">
                <div class="instruction-item">
                    <span class="instruction-number">1</span>
                    <span class="instruction-text">Один партнер читає історію вголос</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-number">2</span>
                    <span class="instruction-text">Другий партнер виконує всі дії з історії</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-number">3</span>
                    <span class="instruction-text">Після історії міняйтесь ролями</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-number">4</span>
                    <span class="instruction-text">Насолоджуйтесь процесом! 🔥</span>
                </div>
            </div>
            <button class="btn primary" onclick="showScreen('menuScreen')">Зрозуміло</button>
        </div>

        <div id="gameScreen" class="screen">
            <h1>📖 Брудні Історії</h1>
            
            <div class="story-card">
                <div class="story-number" id="storyNumber"></div>
                <div class="story-title" id="storyTitle"></div>
                <div class="story-content" id="storyContent"></div>
            </div>
            
            <div class="story-actions">
                <button class="btn primary" onclick="nextStory()">Наступна історія →</button>
                <button class="btn secondary" onclick="previousStory()">← Попередня</button>
            </div>
            
            <div class="story-progress">
                <span id="currentStory">1</span> / <span id="totalStories">50</span>
            </div>
            
            <button class="btn secondary" onclick="showScreen('menuScreen')">В меню</button>
        </div>
    </div>

    <script src="dirty-stories.js"></script>
</body>
</html>
