<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Інтимна Рулетка 🎰</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Екран введення імен -->
        <div id="nameScreen" class="screen active">
            <h2 class="title">Інтимна Рулетка</h2>
            <p class="subtitle">Випадкові завдання з таймером</p>
            <div class="name-inputs">
                <input type="text" class="name-input" placeholder="Гравець 1" id="player0">
                <input type="text" class="name-input" placeholder="Гравець 2" id="player1">
            </div>
            <button class="start-btn" onclick="startGame()">Почати</button>
            <a href="index.html" class="back-btn">← Головне меню</a>
        </div>

        <!-- Екран гри -->
        <div id="gameScreen" class="screen">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="question-counter">
                <span id="currentChallenge">1</span> / <span id="totalChallenges">100</span>
            </div>
            
            <div class="roulette-timer">
                <div class="timer-circle">
                    <span id="timer">0:00</span>
                </div>
            </div>
            
            <div class="question-card">
                <div class="question-icon">🎰</div>
                <p id="challengeText" class="question-text"></p>
            </div>
            
            <button id="startTimer" class="start-btn" onclick="startTimer()">Почати таймер</button>
            <button id="nextChallenge" class="next-btn" onclick="nextChallenge()" style="display:none;">Далі →</button>
            <a href="index.html" class="back-btn">← Головне меню</a>
        </div>
        
        <!-- Екран завершення -->
        <div id="endScreen" class="screen">
            <h2 class="title">Гра завершена!</h2>
            <div class="end-icon">🎊</div>
            <p class="end-message">Сподіваємось, вам було весело!</p>
            <a href="index.html" class="restart-btn">Головне меню</a>
        </div>
    </div>

    <script src="intimate-roulette.js"></script>
</body>
</html>
