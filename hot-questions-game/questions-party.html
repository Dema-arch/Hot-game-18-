<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жаркі Питання (Тусовка) 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Екран введення імен -->
        <div id="nameScreen" class="screen active">
            <h2 class="title">Жаркі Питання для Тусовки</h2>
            <p class="subtitle">Введіть імена 4 гравців</p>
            <div class="name-inputs">
                <input type="text" class="name-input" placeholder="Гравець 1" id="player0">
                <input type="text" class="name-input" placeholder="Гравець 2" id="player1">
                <input type="text" class="name-input" placeholder="Гравець 3" id="player2">
                <input type="text" class="name-input" placeholder="Гравець 4" id="player3">
            </div>
            <button class="start-btn" onclick="startGame()">Почати гру</button>
            <a href="index.html" class="back-btn">← Головне меню</a>
        </div>

        <!-- Екран гри -->
        <div id="gameScreen" class="screen">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="question-counter">
                <span id="currentQuestion">1</span> / <span id="totalQuestions">150</span>
            </div>
            <div class="player-turn">
                <span id="currentPlayer"></span>, твоя черга!
            </div>
            <div class="question-card">
                <div class="question-icon">💭</div>
                <p id="questionText" class="question-text"></p>
            </div>
            <button class="next-btn" onclick="nextQuestion()">Далі →</button>
            <a href="index.html" class="back-btn">← Головне меню</a>
        </div>

        <!-- Екран завершення -->
        <div id="endScreen" class="screen">
            <h2 class="title">Гра завершена!</h2>
            <div class="end-icon">🎊</div>
            <p class="end-message">Сподіваємось, вам було весело!</p>
            <a href="index.html" class="restart-btn">Головне меню</a>
        </div>
    </div>

    <script src="questions-party.js"></script>
</body>
</html>
