<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin the Bottle 🍾</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Екран введення імен -->
        <div id="nameScreen" class="screen active">
            <h2 class="title">Spin the Bottle</h2>
            <p class="subtitle">Введіть імена 4 гравців</p>
            <div class="name-inputs">
                <input type="text" class="name-input" placeholder="Гравець 1" id="player0">
                <input type="text" class="name-input" placeholder="Гравець 2" id="player1">
                <input type="text" class="name-input" placeholder="Гравець 3" id="player2">
                <input type="text" class="name-input" placeholder="Гравець 4" id="player3">
            </div>
            <button class="start-btn" onclick="startGame()">Почати гру</button>
            <a href="index.html" class="back-btn">← Головне меню</a>
        </div>

        <!-- Екран гри -->
        <div id="gameScreen" class="screen">
            <h2 class="title">Spin the Bottle</h2>
            <div class="bottle-container">
                <div id="bottle" class="bottle">🍾</div>
            </div>
            <div id="spinResult" class="spin-result hidden">
                <p class="spin-text"><span id="spinner"></span> → <span id="target"></span></p>
                <p id="spinTask" class="spin-task"></p>
            </div>
            <button id="spinBtn" class="spin-btn" onclick="spinBottle()">Крутити пляшку</button>
            <a href="index.html" class="back-btn">← Головне меню</a>
        </div>
    </div>

    <script src="spin-bottle.js"></script>
</body>
</html>
