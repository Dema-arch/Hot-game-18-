<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Правда чи Дія (Компанія) 🎭</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Екран вибору рівня -->
        <div id="levelScreen" class="screen active">
            <h2 class="title">Правда чи Дія</h2>
            <p class="subtitle">Оберіть рівень складності</p>
            <div class="level-buttons">
                <button class="level-btn easy" onclick="selectLevel('easy')">
                    <span class="level-icon">😊</span>
                    <span class="level-name">Легкий</span>
                    <span class="level-desc">Без пошлості, просто весело</span>
                </button>
                <button class="level-btn normal" onclick="selectLevel('normal')">
                    <span class="level-icon">😏</span>
                    <span class="level-name">Нормальний</span>
                    <span class="level-desc">Особисті питання, інколи пікантні</span>
                </button>
                <button class="level-btn crazy" onclick="selectLevel('crazy')">
                    <span class="level-icon">🤪</span>
                    <span class="level-name">Шалений</span>
                    <span class="level-desc">Пошле, крінжове, без меж</span>
                </button>
            </div>
            <a href="index.html" class="back-btn">← Головне меню</a>
        </div>

        <!-- Екран введення імен -->
        <div id="nameScreen" class="screen">
            <h2 class="title">Правда чи Дія</h2>
            <p class="subtitle">Введіть імена гравців (3-4)</p>
            <div class="name-inputs">
                <input type="text" class="name-input" placeholder="Гравець 1" id="player0">
                <input type="text" class="name-input" placeholder="Гравець 2" id="player1">
                <input type="text" class="name-input" placeholder="Гравець 3" id="player2">
                <input type="text" class="name-input" placeholder="Гравець 4 (необов'язково)" id="player3">
            </div>
            <button class="start-btn" onclick="startGame()">Почати гру</button>
            <a href="index.html" class="back-btn">← Головне меню</a>
        </div>

        <!-- Екран гри -->
        <div id="gameScreen" class="screen">
            <div class="player-turn">
                <span id="currentPlayer"></span>, твоя черга!
            </div>
            <div class="tod-buttons">
                <button class="tod-btn truth-btn" onclick="chooseTruth()">
                    <span class="tod-icon">🤔</span>
                    <span>Правда</span>
                </button>
                <button class="tod-btn dare-btn" onclick="chooseDare()">
                    <span class="tod-icon">😈</span>
                    <span>Дія</span>
                </button>
            </div>
            <div id="todCard" class="tod-card hidden">
                <div class="tod-card-icon">🎭</div>
                <p id="todText" class="tod-text"></p>
                <button class="next-btn" onclick="nextTurn()">Наступний гравець →</button>
            </div>
            <a href="index.html" class="back-btn">← Головне меню</a>
        </div>
    </div>

    <script src="party-truth-dare.js"></script>
</body>
</html>
