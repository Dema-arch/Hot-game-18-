<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стріп-Гра 🎲</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button">← Назад</a>
        
        <div id="levelScreen" class="screen active">
            <h1>🎲 Стріп-Гра</h1>
            <p class="subtitle">Кидай кубик і виконуй завдання або роздягайся!</p>
            
            <div class="level-buttons">
                <button class="level-btn" onclick="selectLevel('soft')">
                    <span class="level-emoji">😊</span>
                    <span class="level-name">М'який</span>
                    <span class="level-desc">Легкі завдання</span>
                </button>
                
                <button class="level-btn" onclick="selectLevel('medium')">
                    <span class="level-emoji">🔥</span>
                    <span class="level-name">Середній</span>
                    <span class="level-desc">Пікантні завдання</span>
                </button>
                
                <button class="level-btn" onclick="selectLevel('hard')">
                    <span class="level-emoji">💋</span>
                    <span class="level-name">Жорсткий</span>
                    <span class="level-desc">Екстремальні завдання</span>
                </button>
            </div>
        </div>

        <div id="gameScreen" class="screen">
            <h1>🎲 Стріп-Гра</h1>
            <div class="level-indicator" id="levelIndicator"></div>
            
            <div class="dice-container">
                <div class="dice" id="dice">?</div>
                <button class="btn primary" id="rollBtn" onclick="rollDice()">Кинути кубик</button>
            </div>
            
            <div class="task-card" id="taskCard" style="display: none;">
                <div class="task-text" id="taskText"></div>
                <div class="task-actions">
                    <button class="btn success" onclick="completeTask()">Виконано ✓</button>
                    <button class="btn danger" onclick="skipTask()">Роздягнутись 👕</button>
                </div>
            </div>
            
            <div class="clothes-counter">
                <div class="clothes-item">
                    <span>👤 Гравець 1:</span>
                    <span id="player1Clothes">5 речей</span>
                </div>
                <div class="clothes-item">
                    <span>👤 Гравець 2:</span>
                    <span id="player2Clothes">5 речей</span>
                </div>
            </div>
            
            <button class="btn secondary" onclick="resetGame()">Нова гра</button>
        </div>

        <div id="endScreen" class="screen">
            <h1>🎉 Гра завершена!</h1>
            <div class="end-message" id="endMessage"></div>
            <div class="end-actions">
                <button class="btn primary" onclick="resetGame()">Грати знову</button>
                <a href="index.html" class="btn secondary">На головну</a>
            </div>
        </div>
    </div>

    <script src="strip-game.js"></script>
</body>
</html>
